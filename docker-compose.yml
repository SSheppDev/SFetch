services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sfdb}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
      POSTGRES_DB: ${POSTGRES_DB:-sfdb}
      READONLY_PASSWORD: ${READONLY_PASSWORD:-}
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-7745}:5432"
    volumes:
      - ./data/docker/postgres:/var/lib/postgresql/data
      - ./src/api/src/db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sfdb} -d ${POSTGRES_DB:-sfdb}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - backend
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '1.0'

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT_INTERNAL: 5432
    ports:
      - "127.0.0.1:${APP_PORT:-7743}:7743"
    volumes:
      - ./data:/app/data
      - ${HOME}/.sfdx:/home/app/.sfdx:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - backend
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '1.0'

networks:
  backend:
    driver: bridge
